<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dot Background - Mouse Avoid</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #0C0B0B;
    overflow: hidden;
    cursor: url('cursor.png') 0 0, auto;
  }
  #blur-overlay { position:fixed; inset:0; backdrop-filter:blur(40px); -webkit-backdrop-filter:blur(40px); z-index:5; pointer-events:none; }
  #dotCanvas {
    display: block;
    width: 100vw;
    height: 100vh;
    height: calc(100vh + env(safe-area-inset-bottom));
  }

</style>
</head>
<body>
<canvas id="dotCanvas"></canvas>
<div id="blur-overlay"></div>
<div id="yt-hidden"></div>

<!-- 커스텀 플레이어 UI -->
<div id="player-ui" style="
  position: fixed;
  bottom: env(safe-area-inset-bottom, 16px);
  left: 50%;
  transform: translateX(-50%);
  width: min(420px, 90vw);
  background: rgba(20,18,18,0.85);
  backdrop-filter: blur(12px);
  border-radius: 18px;
  padding: 14px 18px 12px;
  z-index: 50;
  color: #fff;
  font-family: -apple-system, sans-serif;
  user-select: none;
">
  <div id="track-title" style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:10px;opacity:0.9;">
    불러오는 중…
  </div>

  <!-- 진행 바 -->
  <div id="progress-track" style="height:3px;background:rgba(255,255,255,0.15);border-radius:2px;margin-bottom:10px;cursor:pointer;" onclick="seekTo(event)">
    <div id="progress-bar" style="height:100%;width:0%;background:#BD5A8C;border-radius:2px;transition:width 0.4s linear;"></div>
  </div>

  <!-- 컨트롤 -->
  <div style="display:flex;align-items:center;justify-content:space-between;">
    <span id="track-time" style="font-size:11px;opacity:0.5;">0:00 / 0:00</span>
    <div style="display:flex;gap:20px;align-items:center;">
      <button onclick="ytPlayer&&ytPlayer.previousVideo()" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer;opacity:0.7;padding:0;">⏮</button>
      <button id="btn-play" onclick="togglePlay()" style="background:#BD5A8C;border:none;color:#fff;font-size:20px;cursor:pointer;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;">▶</button>
      <button onclick="ytPlayer&&ytPlayer.nextVideo()" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer;opacity:0.7;padding:0;">⏭</button>
    </div>
    <div style="width:60px;"></div>
  </div>
</div>

<canvas id="idleCanvas" style="
  position: absolute;
  bottom: calc(0px - env(safe-area-inset-bottom, 0px));
  left: 50%;
  transform: translateX(-50%);
  width: 546px;
  height: 546px;
  z-index: 20;
  pointer-events: auto;
"></canvas>

<script>
const canvas = document.getElementById('dotCanvas');
const ctx = canvas.getContext('2d');

const DOT_COLOR = '#BD5A8C';
const BG_COLOR = '#0C0B0B';

// ---- 샘플 이미지 분석값 (8000x4566 원본 기준) ----
// 가로 간격 739px / 지름 167px / 줄마다 가로 간격의 절반(369.5px)만큼 어긋남
// 어긋난 줄 사이의 실제 세로 간격은 490.5px (스태거 적용)
const REF_WIDTH = 8000;
const REF_SPACING_X = 739;
const REF_ROW_PITCH = 490.5;
const REF_DOT_RADIUS = 50.1; // 8.35의 6배

let SPACING_X, ROW_PITCH, DOT_RADIUS;

const AVOID_RATIO = 1.55;   // 마우스 반응 범위 (SPACING_X 대비)
const PUSH_RATIO = 0.41;    // 최대로 밀려나는 거리 (SPACING_X 대비)
const EASE = 0.12;          // 원래 자리로 돌아오는 속도 (0~1)

let AVOID_RADIUS, MAX_PUSH;

function updateScale() {
  const scale = window.innerWidth / REF_WIDTH;
  SPACING_X = REF_SPACING_X * scale;
  ROW_PITCH = REF_ROW_PITCH * scale;
  DOT_RADIUS = REF_DOT_RADIUS * scale;
  AVOID_RADIUS = SPACING_X * AVOID_RATIO;
  MAX_PUSH = SPACING_X * PUSH_RATIO;
}

let mouse = { x: -9999, y: -9999 };
let dots = [];
let dpr = window.devicePixelRatio || 1;
const topImageEl = document.getElementById('topImage');


function getViewH() {
  if (window.visualViewport) return window.visualViewport.height;
  const svh = document.documentElement.clientHeight;
  return svh || window.innerHeight;
}

function resize() {
  const vh = getViewH();
  canvas.width = window.innerWidth * dpr;
  canvas.height = vh * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = vh + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  updateScale();
  buildGrid();
}

function buildGrid() {
  dots = [];
  const w = window.innerWidth;
  const h = getViewH();

  // 화면 중앙 기준으로 격자를 배치해서 잘림이 자연스럽게 보이도록 함
  const cols = Math.ceil(w / SPACING_X) + 3; // 어긋난 줄을 위해 여유 컬럼 추가
  const rows = Math.ceil(h / ROW_PITCH) + 2;
  const offsetX = (w - (cols - 1) * SPACING_X) / 2;
  const offsetY = (h - (rows - 1) * ROW_PITCH) / 2;

  for (let r = 0; r < rows; r++) {
    const rowShift = (r % 2 === 1) ? SPACING_X / 2 : 0; // 홀수 줄은 절반만큼 어긋나게
    for (let c = 0; c < cols; c++) {
      const ox = offsetX + c * SPACING_X + rowShift;
      const oy = offsetY + r * ROW_PITCH;
      dots.push({
        ox, oy,           // 원래 위치 (origin)
        x: ox, y: oy,     // 현재 위치
      });
    }
  }
}

function animate() {
  ctx.fillStyle = BG_COLOR;
  ctx.fillRect(0, 0, window.innerWidth, getViewH());

  // 이미지 영역 (약간의 여유 패딩 포함) - 이 영역과 겹치는 도트는 그리지 않음
  let imgBox = null;
  if (topImageEl) {
    const rect = topImageEl.getBoundingClientRect();
    const pad = DOT_RADIUS;
    imgBox = {
      left: rect.left - pad,
      right: rect.right + pad,
      top: rect.top - pad,
      bottom: rect.bottom + pad,
    };
  }

  for (const dot of dots) {
    const dx = dot.ox - mouse.x;
    const dy = dot.oy - mouse.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    let targetX = dot.ox;
    let targetY = dot.oy;

    const activeRadius = mouse.isTouch ? AVOID_RADIUS * 2.5 : AVOID_RADIUS;
    if (dist < activeRadius) {
      // 가까울수록 더 세게 밀어냄 (0~1 비율)
      const strength = (1 - dist / activeRadius);
      const angle = Math.atan2(dy, dx);
      const push = strength * MAX_PUSH;
      targetX = dot.ox + Math.cos(angle) * push;
      targetY = dot.oy + Math.sin(angle) * push;
    }

    // 부드럽게 목표 위치로 이동 (이징)
    dot.x += (targetX - dot.x) * EASE;
    dot.y += (targetY - dot.y) * EASE;

    if (imgBox &&
        dot.x > imgBox.left && dot.x < imgBox.right &&
        dot.y > imgBox.top && dot.y < imgBox.bottom) {
      continue;
    }

    ctx.beginPath();
    ctx.arc(dot.x, dot.y, DOT_RADIUS, 0, Math.PI * 2);
    ctx.fillStyle = DOT_COLOR;
    ctx.fill();
  }

  requestAnimationFrame(animate);
}

window.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  const zone = getZone(e.clientX, e.clientY);
  if (zone !== lastZone) { lastZone = zone; goTo(zone); }
});

window.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  mouse.x = touch.clientX;
  mouse.y = touch.clientY;
  mouse.isTouch = true;
  const zone = getZone(touch.clientX, touch.clientY);
  if (zone !== lastZone) { lastZone = zone; goTo(zone); }
}, { passive: false });

window.addEventListener('mouseleave', () => {
  mouse.x = -9999;
  mouse.y = -9999;
});

window.addEventListener('touchend', () => {
  mouse.x = -9999;
  mouse.y = -9999;
  mouse.isTouch = false;
});







// ---- 캐릭터 스프라이트 상태머신 ----
const idleCanvas = document.getElementById('idleCanvas');
const idleCtx = idleCanvas.getContext('2d');
idleCanvas.width = 960;
idleCanvas.height = 960;

const FRAME_SIZE = 960;
const FPS_IDLE = 24;
const FPS_TRANS = 60;

const SPRITES = {
  idle:              { src: 'idle.webp',              cols: 6, total: 27 },
  front_lefttop:     { src: 'front_lefttop.webp',     cols: 8, total: 67 },
  lefttop_top:       { src: 'lefttop_top.webp',       cols: 6, total: 32 },
  top_righttop:      { src: 'top_righttop.webp',      cols: 8, total: 59 },
  righttop_front:    { src: 'righttop_front.webp',    cols: 6, total: 36 },
  lefttop_leftdown:  { src: 'lefttop_leftdown.webp',  cols: 8, total: 64 },
  leftdown_front:    { src: 'leftdown_front.webp',    cols: 6, total: 33 },
  shake:             { src: 'shake.webp',              cols: 6, total: 56 },
};

// 이미지 프리로드
const imgs = {};
let loadedCount = 0;
Object.entries(SPRITES).forEach(([key, s]) => {
  const img = new Image();
  img.src = s.src;
  img.onload = () => { loadedCount++; if (loadedCount === Object.keys(SPRITES).length) startIdle(); };
  imgs[key] = img;
});

// 상태: front, lefttop, top, righttop
let charState = 'front';
let animKey = 'idle';
let animFrame = 0;
let animReverse = false;
let animLoop = true;
let animOnEnd = null;
let animTimer = null;

// 전환 체인 정의 (state → state: [{key, reverse}])
const TRANSITIONS = {
  front: {
    lefttop:   [{ key: 'front_lefttop', rev: false }],
    righttop:  [{ key: 'righttop_front', rev: true }],
    top:       [{ key: 'front_lefttop', rev: false }, { key: 'lefttop_top', rev: false }],
    leftdown:  [{ key: 'leftdown_front', rev: true }],
  },
  lefttop: {
    front:     [{ key: 'front_lefttop', rev: true }],
    top:       [{ key: 'lefttop_top', rev: false }],
    righttop:  [{ key: 'lefttop_top', rev: false }, { key: 'top_righttop', rev: false }],
    leftdown:  [{ key: 'lefttop_leftdown', rev: false }],
  },
  top: {
    righttop:  [{ key: 'top_righttop', rev: false }],
    lefttop:   [{ key: 'lefttop_top', rev: true }],
    front:     [{ key: 'lefttop_top', rev: true }, { key: 'front_lefttop', rev: true }],
    leftdown:  [{ key: 'lefttop_top', rev: true }, { key: 'lefttop_leftdown', rev: false }],
  },
  righttop: {
    front:     [{ key: 'righttop_front', rev: false }],
    top:       [{ key: 'top_righttop', rev: true }],
    lefttop:   [{ key: 'top_righttop', rev: true }, { key: 'lefttop_top', rev: true }],
    leftdown:  [{ key: 'top_righttop', rev: true }, { key: 'lefttop_top', rev: true }, { key: 'lefttop_leftdown', rev: false }],
  },
  leftdown: {
    front:     [{ key: 'leftdown_front', rev: false }],
    lefttop:   [{ key: 'lefttop_leftdown', rev: true }],
    top:       [{ key: 'lefttop_leftdown', rev: true }, { key: 'lefttop_top', rev: false }],
    righttop:  [{ key: 'lefttop_leftdown', rev: true }, { key: 'lefttop_top', rev: false }, { key: 'top_righttop', rev: false }],
  },
};

// 상태별 도착 위치
const STATE_ENDS = {
  front_lefttop:    { fwd: 'lefttop',   rev: 'front' },
  lefttop_top:      { fwd: 'top',       rev: 'lefttop' },
  top_righttop:     { fwd: 'righttop',  rev: 'top' },
  righttop_front:   { fwd: 'front',     rev: 'righttop' },
  lefttop_leftdown: { fwd: 'leftdown',  rev: 'lefttop' },
  leftdown_front:   { fwd: 'front',     rev: 'leftdown' },
};

const PUPIL_R = 26;
const PUPIL_LIMIT = 0.42;
let EYE_DATA = null;
// 눈동자 lerp 상태 (최대 2개 눈)
const pupilCurrent = [{ox:0,oy:0},{ox:0,oy:0}];
let eyeRedrawTimer = null;
let eyeStaticKey = null;
let eyeStaticFrame = null;

function startEyeRedraw(key, frame) {
  stopEyeRedraw();
  eyeStaticKey = key;
  eyeStaticFrame = frame;
  const capturedKey = key;
  const capturedFrame = frame;
  const sprite = SPRITES[capturedKey];
  const img = imgs[capturedKey];
  if (!sprite || !img) return;
  const sx = (capturedFrame % sprite.cols) * FRAME_SIZE;
  const sy = Math.floor(capturedFrame / sprite.cols) * FRAME_SIZE;
  function loop() {
    try {
      idleCtx.clearRect(0, 0, 960, 960);
      drawEyes(capturedKey, capturedFrame);
      idleCtx.drawImage(img, sx, sy, FRAME_SIZE, FRAME_SIZE, 0, 0, 960, 960);
    } catch(e) { /* 에러 시 다음 프레임에서 재시도 */ }
    eyeRedrawTimer = requestAnimationFrame(loop);
  }
  eyeRedrawTimer = requestAnimationFrame(loop);
}
function stopEyeRedraw() {
  if (eyeRedrawTimer) { cancelAnimationFrame(eyeRedrawTimer); eyeRedrawTimer = null; }
}

fetch('eye_data.json').then(r=>r.json()).then(d=>{ EYE_DATA=d; });

function drawEyes(key, frame) {
  if (!EYE_DATA || !EYE_DATA[key]) return;
  const frameEyes = EYE_DATA[key][frame];
  if (!frameEyes) return;

  const rect = idleCanvas.getBoundingClientRect();
  const scaleX = 960 / rect.width;
  const scaleY = 960 / rect.height;
  const mx = (mouse.x - rect.left) * scaleX;
  const my = (mouse.y - rect.top) * scaleY;

  for (let eyeIdx = 0; eyeIdx < frameEyes.length; eyeIdx++) {
    const [cx,cy,rx,ry] = frameEyes[eyeIdx];
    // 헤드폰 귀마개 오탐지 제거: 세로가 가로의 2배 이상이면 스킵
    if (ry / rx > 2) continue;
    // 흰자 크기: idle 1.5x, 전환 애니 1.4x
    const eyeScale = key === 'idle' ? 1.5 : 1.4;
    idleCtx.beginPath();
    idleCtx.ellipse(cx, cy, rx * eyeScale, ry * eyeScale, 0, 0, Math.PI*2);
    idleCtx.fillStyle = '#ffffff';
    idleCtx.fill();

    // 동공 목표 위치 계산
    const dx = mx - cx, dy = my - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const pupilVis = key === 'idle' ? 0.6 : 0.9;
    const limitX = Math.max(0, rx - PUPIL_R * pupilVis);
    const limitY = Math.max(0, ry - PUPIL_R * pupilVis);
    const targetOx = dist > 0 ? Math.min(Math.abs(dx), limitX) * (dx < 0 ? -1 : 1) : 0;
    const targetOy = dist > 0 ? Math.min(Math.abs(dy), limitY) * (dy < 0 ? -1 : 1) : 0;
    // lerp: 현재 위치 → 목표 위치로 부드럽게
    const p = pupilCurrent[eyeIdx];
    p.ox += (targetOx - p.ox) * 0.10;
    p.oy += (targetOy - p.oy) * 0.10;
    idleCtx.beginPath();
    idleCtx.arc(cx + p.ox, cy + p.oy, PUPIL_R, 0, Math.PI*2);
    idleCtx.fillStyle = '#111';
    idleCtx.fill();
  }
}

function drawFrame(key, frame) {
  const s = SPRITES[key];
  const col = frame % s.cols;
  const row = Math.floor(frame / s.cols);

  idleCtx.clearRect(0, 0, 960, 960);
  // 1. 눈 먼저 그리기
  drawEyes(key, frame);
  // 2. 캐릭터를 source-over로 위에 → 투명 구멍(eye hole)으로 눈이 보임
  idleCtx.drawImage(imgs[key], col*FRAME_SIZE, row*FRAME_SIZE, FRAME_SIZE, FRAME_SIZE, 0, 0, 960, 960);
}

function playAnim(key, reverse, loop, onEnd) {
  if (animTimer) cancelAnimationFrame(animTimer);
  stopEyeRedraw();
  animKey = key;
  animReverse = reverse;
  animLoop = loop;
  animOnEnd = onEnd;
  const s = SPRITES[key];
  const isIdle = key === 'idle';
  const baseFps = isIdle ? FPS_IDLE : FPS_TRANS;
  animFrame = reverse ? s.total - 1 : 0;
  drawFrame(key, animFrame);

  let lastTime = performance.now();
  let subFrame = 0;

  function tick(now) {
    const elapsed = now - lastTime;
    lastTime = now;

    let speed = 1;
    if (!isIdle) {
      // sine ease-out: 부드럽게 감속
      const progress = reverse
        ? (s.total - 1 - animFrame) / Math.max(s.total - 1, 1)
        : animFrame / Math.max(s.total - 1, 1);
      speed = 1.0 + 0.9 * Math.cos(progress * Math.PI / 2);
    }

    subFrame += (elapsed / (1000 / baseFps)) * speed;

    while (subFrame >= 1) {
      subFrame -= 1;
      animFrame += reverse ? -1 : 1;
      const done = reverse ? animFrame < 0 : animFrame >= s.total;
      if (done) {
        if (loop) {
          animFrame = reverse ? s.total - 1 : 0;
        } else {
          animFrame = reverse ? 0 : s.total - 1;
          drawFrame(key, animFrame);
          if (onEnd) onEnd();
          return;
        }
      }
      drawFrame(key, animFrame);
    }

    animTimer = requestAnimationFrame(tick);
  }

  animTimer = requestAnimationFrame(tick);
}

function startIdle() {
  if (isPlaying) {
    playAnim('idle', false, true, null);
  } else {
    // 재생 중 아닐 때: idle 첫 프레임 정지
    if (animTimer) cancelAnimationFrame(animTimer);
    stopEyeRedraw();
    drawFrame('idle', 0);
    startEyeRedraw('idle', 0);
  }
}

let transQueue = [];
let isTransitioning = false;
let pendingZone = null;

function runQueue() {
  if (transQueue.length === 0) {
    isTransitioning = false;
    if (pendingZone && pendingZone !== charState) {
      const z = pendingZone; pendingZone = null;
      goTo(z);
    } else {
      if (charState === 'front') {
        startIdle();
      } else {
        // front 외 상태: 마지막 프레임 유지 + 눈동자 계속 업데이트
        startEyeRedraw(animKey, animFrame);
      }
    }
    return;
  }
  const { key, rev } = transQueue.shift();
  const ends = STATE_ENDS[key];
  isTransitioning = true;
  playAnim(key, rev, false, () => {
    charState = rev ? ends.rev : ends.fwd;
    runQueue();
  });
}

function goTo(target) {
  if (isShaking) return;
  if (target === charState) return;
  if (isTransitioning) { pendingZone = target; return; }
  const chain = TRANSITIONS[charState]?.[target];
  if (!chain) {
    // 전환 경로 없으면 현재 상태 유지 (캐릭터 사라짐 방지)
    startEyeRedraw(animKey, animFrame);
    return;
  }
  transQueue = [...chain];
  runQueue();
}

function getZone(x, y) {
  const rect = idleCanvas.getBoundingClientRect();
  const isLeft = x < rect.left + rect.width * 0.30;
  const isRight = x > rect.right - rect.width * 0.30;
  const isTop = y < rect.top + rect.height * 0.5;
  if (isLeft && isTop) return 'lefttop';
  if (isLeft && !isTop) return 'leftdown';
  if (isRight) return 'righttop';
  if (isTop) return 'top';
  return 'front';
}

let lastZone = 'front';
let idleTimeout = null;
function resetIdleTimer() {
  clearTimeout(idleTimeout);
  idleTimeout = setTimeout(() => { lastZone = 'front'; goTo('front'); }, 1000);
}

window.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  const zone = getZone(e.clientX, e.clientY);
  if (zone !== lastZone) { lastZone = zone; goTo(zone); }
  resetIdleTimer();
});

window.addEventListener('mouseleave', () => {
  mouse.x = -9999;
  mouse.y = -9999;
  lastZone = 'front';
  goTo('front');
});

window.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  mouse.x = touch.clientX;
  mouse.y = touch.clientY;
  mouse.isTouch = true;
  const zone = getZone(touch.clientX, touch.clientY);
  if (zone !== lastZone) { lastZone = zone; goTo(zone); }
  resetIdleTimer();
}, { passive: false });

window.addEventListener('touchend', () => {
  mouse.x = -9999;
  mouse.y = -9999;
  mouse.isTouch = false;
  lastZone = 'front';
  goTo('front');
});

// 얼굴 클릭 → shake
let isShaking = false;
function isFaceClick(x, y) {
  const rect = idleCanvas.getBoundingClientRect();
  const rx = (x - rect.left) / rect.width;
  const ry = (y - rect.top) / rect.height;
  return rx > 0.2 && rx < 0.8 && ry > 0.1 && ry < 0.85;
}
idleCanvas.addEventListener('click', (e) => {
  if (isShaking) return;
  if (!isFaceClick(e.clientX, e.clientY)) return;
  isShaking = true;
  if (animTimer) cancelAnimationFrame(animTimer);
  stopEyeRedraw();
  playAnim('shake', false, false, () => {
    isShaking = false;
    if (charState === 'front') startIdle();
    else startEyeRedraw(animKey, animFrame);
  });
});
idleCanvas.addEventListener('touchend', (e) => {
  if (isShaking) return;
  const touch = e.changedTouches[0];
  if (!isFaceClick(touch.clientX, touch.clientY)) return;
  isShaking = true;
  if (animTimer) cancelAnimationFrame(animTimer);
  stopEyeRedraw();
  playAnim('shake', false, false, () => {
    isShaking = false;
    if (charState === 'front') startIdle();
    else startEyeRedraw(animKey, animFrame);
  });
});

window.addEventListener('resize', resize);

resize();
animate();

// ---- YouTube 플레이어 ----
let isPlaying = false;
let ytPlayer = null;

const ytTag = document.createElement('script');
ytTag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(ytTag);

function togglePlay() {
  if (!ytPlayer) return;
  isPlaying ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
}
function seekTo(e) {
  if (!ytPlayer) return;
  const bar = document.getElementById('progress-track');
  const pct = e.offsetX / bar.offsetWidth;
  ytPlayer.seekTo(ytPlayer.getDuration() * pct, true);
}

window.onYouTubeIframeAPIReady = function() {
  ytPlayer = new YT.Player('yt-hidden', {
    height: '0', width: '0',
    playerVars: { listType: 'playlist', list: 'PLclKxWEml0RE', autoplay: 1 },
    events: {
      onReady: (e) => { e.target.playVideo(); updateTrackUI(); },
      onStateChange: (e) => {
        isPlaying = e.data === YT.PlayerState.PLAYING;
        if (charState === 'front') startIdle();
        updateTrackUI();
        updateProgress();
      }
    }
  });
};

function updateTrackUI() {
  if (!ytPlayer || !ytPlayer.getVideoData) return;
  const data = ytPlayer.getVideoData();
  document.getElementById('track-title').textContent = data.title || '';
  document.getElementById('btn-play').textContent = isPlaying ? '⏸' : '▶';
}

let progressTimer = null;
function updateProgress() {
  clearInterval(progressTimer);
  if (!isPlaying) return;
  progressTimer = setInterval(() => {
    if (!ytPlayer || !ytPlayer.getCurrentTime) return;
    const cur = ytPlayer.getCurrentTime();
    const dur = ytPlayer.getDuration();
    const pct = dur > 0 ? (cur / dur) * 100 : 0;
    document.getElementById('progress-bar').style.width = pct + '%';
    const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
    document.getElementById('track-time').textContent = `${fmt(cur)} / ${fmt(dur)}`;
  }, 500);
}

function updateOverlay() {

  overlay.querySelector('#zlabel-f').style.top = (midY + 8) + 'px';
}
updateOverlay();
window.addEventListener('resize', updateOverlay);
